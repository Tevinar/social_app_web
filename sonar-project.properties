# Identify the SonarQube Cloud project that will receive the analysis results.
sonar.projectKey=Tevinar_social_app_web

# Identify the SonarQube Cloud organization that owns the project.
sonar.organization=tevinar

# Define the main frontend source tree that should be analyzed.
sonar.sources=src

# Declare that colocated frontend tests also live under `src`.
sonar.tests=src

# Narrow the test scope to Jest test files only.
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# Exclude test files from the main source scope since sources and tests share `src`.
sonar.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# Tell SonarQube where Jest writes the LCOV coverage report.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Use UTF-8 when reading source files during analysis.
sonar.sourceEncoding=UTF-8
